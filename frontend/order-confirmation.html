<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmation - ShopSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">ShopSmart</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="card p-5 text-center shadow-sm">
      <h2>Thank you for your order!</h2>
      <p class="lead">Your order has been placed successfully.</p>
      <div id="confirmationDetails"></div>
      <a href="index.html" class="btn btn-primary mt-4">Continue Shopping</a>
    </div>
  </main>

  <footer class="bg-dark text-light py-4">
    <div class="container text-center">
      <p class="mb-0">© 2026 ShopSmart.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const confirmationDetails = document.getElementById('confirmationDetails');
    const order = JSON.parse(localStorage.getItem('orderConfirmation')) || null;
    if (order && confirmationDetails) {
      confirmationDetails.innerHTML = `
        <p><strong>Shipping address:</strong> ${order.shippingAddress}</p>
        <p><strong>Payment method:</strong> ${order.paymentMethod}</p>
        <p><strong>Items:</strong> ${order.cartItems.length}</p>
      `;
      localStorage.removeItem('orderConfirmation');
    }
  </script>
</body>
</html>
