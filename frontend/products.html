<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products - ShopSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">ShopSmart</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row gy-4">
      <div class="col-lg-3">
        <div class="card p-3 mb-4">
          <h5>Filters</h5>
          <div class="mb-3">
            <label class="form-label">Search</label>
            <input type="text" id="searchInput" class="form-control" placeholder="Search products" />
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select id="categorySelect" class="form-select">
              <option value="">All</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Price Range</label>
            <input type="number" id="minPrice" class="form-control mb-2" placeholder="Min" />
            <input type="number" id="maxPrice" class="form-control" placeholder="Max" />
          </div>
          <button id="filterBtn" class="btn btn-primary w-100">Apply Filters</button>
        </div>
      </div>
      <div class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3>Products</h3>
          <a href="cart.html" class="btn btn-outline-primary">View Cart</a>
        </div>
        <div class="row g-4" id="productGrid"></div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-light py-4">
    <div class="container text-center">
      <p class="mb-0">© 2026 ShopSmart.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
