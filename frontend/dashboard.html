<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard - ShopSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">ShopSmart</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <h3>User Dashboard</h3>
    <div class="row g-4 mt-4">
      <div class="col-lg-4">
        <div class="card p-4 shadow-sm">
          <h5>Profile</h5>
          <p id="dashboardName">Name: Guest</p>
          <p id="dashboardEmail">Email: guest@example.com</p>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card p-4 shadow-sm">
          <h5>Your Orders</h5>
          <div id="orderHistory">Loading orders...</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-light py-4">
    <div class="container text-center">
      <p class="mb-0">© 2026 ShopSmart.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const userData = JSON.parse(localStorage.getItem('shopUser')) || {};
    const dashboardName = document.getElementById('dashboardName');
    const dashboardEmail = document.getElementById('dashboardEmail');
    const orderHistory = document.getElementById('orderHistory');

    if (userData.user) {
      dashboardName.textContent = `Name: ${userData.user.name}`;
      dashboardEmail.textContent = `Email: ${userData.user.email}`;
    }

    orderHistory.innerHTML = '<p class="text-muted">Order history integration requires backend API access.</p>';
  </script>
</body>
</html>
